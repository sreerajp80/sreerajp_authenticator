name: sreerajp_authenticator
description: "A modern TOTP/HOTP authenticator app"
publish_to: 'none'
version: 2.5.3+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core authenticator functionality
  base32: ^2.1.3  # For base32 encoding/decoding

  # QR Code scanning
  mobile_scanner: ^7.1.2  # Modern QR scanner with flashlight support

  # Database
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # Security
  local_auth: 3.0.0  # For biometric/PIN authentication
  screen_protector: 1.4.2  # Prevent screenshots and screen recording

  # UI/UX
  provider: ^6.1.2  # State management
  flutter_slidable: ^4.0.3  # Swipe actions on tiles
  animations: ^2.0.11  # Smooth animations
  flutter_svg: ^2.0.10+1  # SVG icons support

  # Utilities
  flutter_secure_storage: 10.0.0  # Secure storage for sensitive data
  share_plus: ^12.0.0  # For export functionality
  file_picker: ^10.3.3  # For import functionality
  permission_handler: ^12.0.1  # Handle permissions
  url_launcher: ^6.3.1  # For opening links
  qr_flutter: ^4.1.0  # For QR code generation [[5]]

  # Modern UI components
  flutter_animate: ^4.5.0  # Beautiful animations
  shimmer: ^3.0.0  # Loading effects

  package_info_plus: ^9.0.0

  path_provider: ^2.1.5
  encrypt: 5.0.3
  pointycastle: 3.9.1
  percent_indicator: ^4.2.3

  crypto: 3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  sqflite_common_ffi: ^2.3.4+4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

  # Android Adaptive Icon (works on Android 8.0+)
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  default-flavor: dev
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-Bold.ttf
          weight: 700
