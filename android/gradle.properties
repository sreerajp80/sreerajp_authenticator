org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation — works around a known bug where the
# pub cache (H:\) and project (L:\) are on different Windows drive roots, causing
# RelocatableFileToPathConverter.toPath to fail with "different roots".
kotlin.incremental=false
